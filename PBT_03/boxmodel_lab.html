<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box Model Demo</title>

    <link rel="stylesheet" href="boxmodel.css">
</head>
<body>

    <h1>Phần 1 — Content-box vs Border-box</h1>

    <div class="box-container">

        <!-- Hộp 1 -->
        <div class="box content-box">
            <h2>Content Box</h2>
            <p>box-sizing: content-box</p>
        </div>

        <!-- Hộp 2 -->
        <div class="box border-box">
            <h2>Border Box</h2>
            <p>box-sizing: border-box</p>
        </div>

    </div>

    <hr>

    <h1>Phần 2 — Layout 3 cột</h1>

    <h2>Không dùng border-box</h2>

    <div class="layout normal-layout">

        <div class="sidebar">
            Sidebar
        </div>

        <div class="content">
            Content
        </div>

        <div class="ads">
            Ads
        </div>

    </div>

    <h2>Dùng border-box</h2>

    <div class="layout borderbox-layout">

        <div class="sidebar">
            Sidebar
        </div>

        <div class="content">
            Content
        </div>

        <div class="ads">
            Ads
        </div>

    </div>

</body>
</html>
