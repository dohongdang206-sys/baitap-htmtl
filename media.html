<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <section>
        <h2>iphone 16 pro max</h2>
        <figure>
            <img src="images/tải xuống.webp" alt="Hình ảnh mặt trước" loading="lazy" style="max-width: 100%;height: auto;">
            <figcaption>Ảnh mặt trước iphone 16 pro max</figcaption>

        </figure>
        <figure>

            <figcaption>Hình ảnh viền ip16 pro max</figcaption>
        </figure>
    </section>
    <section>
        <h2> Video về Sản phẩm</h2>
        <iframe width="560" height="315" src="https://www.youtube.com/embed/70gCxCTpvBg?si=LXVMce-gk19lEf2Y" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>

    </section>
    <section>
        <h2> Video sản phẩm </h2>
        <video height="400" width="300" poster="images/tải xuống.webp" controls>
            <source  src="images/Giới thiệu iPhone 16 Pro Max vừa ra mắt của Apple - Báo Dân trí.mp4" type="video/mp4" >

            trình duyệt không hỗ trợ video
        </video>
    </section>
    <section>
        <h2> Nhạc nền Giới thiệu</h2>
        <audio controls>
            <source src="images/Quyết định đưa Nico Williams vào ngõ cụt - Znews.vn.mp3" type="audio/mpeg">
            Trình duyệt không hỗ trợ audio
        </audio>
    </section>
    <section>
        <h2>Logo ĐƠn GIản</h2>
            <svg width = "100" height = "100">
                <circle cx ="50" cy="50" r="40" fill ="blue"/>
            </svg>
